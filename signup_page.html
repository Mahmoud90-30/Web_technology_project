<!DOCTYPE html>
<html>
<head>
    <title>signup</title>
</head>
<body>

    <center>

    <form method="post">

        <h2>Signup</h2>

        <div class="username">
            <label>Username</label>
            <input type="text" name="username"  placeholder="Username"  size="30">
        </div>

        <br><br>

        <div class="email">
            <label >Email</label>
            <input type="email"  name="email"  placeholder="Write a valid Email" size="30">
        </div>

        <br><br>

        <div class="password">
            <label>Password</label>
            <input type="password" name="password"  placeholder="Complex password"  size="30">
        </div>
        
        <br><br>

        <div class="confirm_password">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm password" size="30">
        </div>

        <br><br>

        <div class="Account">
            <label>Account Type:</label>
            <select required>
                <option disabled selected>Select your role</option> 
                <option>Admin</option>
                <option>User</option>
            </select>
        </div>
        <br><br>
        <div class="submit_button">
            <button type="submit">
                Create Account
            </button>
        </div>
        <br>
        <div class="login_link">
            <a href="login.html" >
                Login here
            </a>
        </div>

    </form>
        <div>
            <a href="Home page.html">Home</a>
        </div>
    </center>
</body>
</html>
