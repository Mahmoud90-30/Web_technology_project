
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body style="background-color:#eaf4f4; font-family:Arial, sans-serif;">

    <center>

        <h2 style="color:#2c3e50; letter-spacing:1px;">Login</h2>

        <form method="post">

            <div>
                <label style="color:#34495e; font-weight:bold;">Email Address:</label><br><br>
                <input type="email" name="email" required  placeholder="Enter your email"  size="35"
                       style="border:1px solid #cccccc; padding:6px; border-radius:5px;">
            </div>
            <br><br>
            <div>
                <label style="color:#34495e; font-weight:bold;">Password:</label><br><br>
                <input type="password" name="password" placeholder="Enter your password" 
                       size="35" style="border:1px solid #cccccc; padding:6px; border-radius:5px;">
            </div>
            <br><br>

            <div>
                <button type="submit" style="width:200px; height:30px; background-color:#333358; color:white; border:none; border-radius:5px;">
                    Login
                </button>
            </div>
            <br>
            <div>
                <a href="signup_page.html" style="color:#2980b9; text-decoration:none; font-weight:bold;">
                    Sign up here
                </a>
            </div>
            

        </form>

        <div style="position: absolute; top: 15px; left: 15px;">
    <a href="Home page.html" 
       style="background-color:#347fbd; color:rgb(171, 226, 226); padding:5px 10px; ">
        Home
    </a>
</div>

    </center>

</body>
</html>
